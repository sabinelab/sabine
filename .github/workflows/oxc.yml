name: oxc format and check
on:
  push:
    branches: ["**"]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'README*'
      - 'LICENSE'
      - 'crowdin.yml'
  pull_request:
    branches: ["**"]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'README*'
      - 'LICENSE'
      - 'crowdin.yml'
      - '.github/**'

jobs:
  format-and-lint:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      final_sha: ${{ steps.capture-final-sha.outputs.sha }}

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: checkout code
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref }}
          persist-credentials: true

      - name: setup Bun
        uses: oven-sh/setup-bun@main
        with:
          bun-version-file: package.json

      - name: install dependencies
        run: bun ci

      - name: run oxlint and oxfmt autofix
        if: github.event_name == 'push'
        run: |
          bun lint --fix
          bun fmt

      - name: commit changes
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@master
        with:
          commit_message: 'style: run oxc autofix'
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: capture final commit sha
        id: capture-final-sha
        if: github.event_name == 'push'
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: check formatting
        if: github.event_name == 'pull_request'
        run: bun fmt --check

      - name: run oxlint with github annotations
        if: github.event_name == 'pull_request'
        run: bun lint --format=github

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: format-and-lint
    uses: ./.github/workflows/deploy.yml
    with:
      base_sha: ${{ github.event.before }}
      deploy_sha: ${{ needs.format-and-lint.outputs.final_sha }}
      source_event_name: ${{ github.event_name }}
      source_ref: ${{ github.ref }}
    secrets: inherit