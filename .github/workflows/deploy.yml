name: deploy apps
on:
  workflow_call:
    inputs:
      base_sha:
        required: true
        type: string
      deploy_sha:
        required: true
        type: string
      source_event_name:
        required: true
        type: string
      source_ref:
        required: true
        type: string
  workflow_run:
    workflows: ["oxc format and check"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.gitignore'
      - 'README*'
      - 'LICENSE'
      - 'crowdin.yml'

jobs:
  prepare-deploy:
    name: 'prepare deploy'
    if: |
      github.event_name == 'workflow_call' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.actor.login != 'github-actions[bot]' &&
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
      base_sha: ${{ steps.resolve.outputs.base_sha }}
      deploy_sha: ${{ steps.resolve.outputs.deploy_sha }}
    steps:
      - name: checkout code
        if: github.event_name == 'push'
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: download deploy metadata
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@main
        with:
          name: deploy-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .deploy

      - name: resolve deploy inputs
        id: resolve
        run: |
          SHOULD_DEPLOY="false"
          BASE_SHA=""
          DEPLOY_SHA=""

          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            if [ "${{ inputs.source_event_name }}" = "push" ] && [ "${{ inputs.source_ref }}" = "refs/heads/main" ]; then
              SHOULD_DEPLOY="true"
              BASE_SHA="${{ inputs.base_sha }}"
              DEPLOY_SHA="${{ inputs.deploy_sha }}"
            fi
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            . .deploy/deploy.env
            SHOULD_DEPLOY="true"
            BASE_SHA="$base_sha"
            DEPLOY_SHA="$deploy_sha"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE_SHA="${{ github.event.before }}"
            DEPLOY_SHA="${{ github.sha }}"

            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git rev-list --max-parents=0 "$DEPLOY_SHA")"
            fi

            NON_IGNORED_FILES=""

            while IFS= read -r file; do
              case "$file" in
                *.md|.gitignore|README*|LICENSE|crowdin.yml) ;;
                *) NON_IGNORED_FILES="$NON_IGNORED_FILES $file" ;;
              esac
            done < <(git diff --name-only "$BASE_SHA" "$DEPLOY_SHA")

            if [ -z "$NON_IGNORED_FILES" ]; then
              SHOULD_DEPLOY="true"
            else
              echo "Skipping direct deploy because this push includes files handled by the OXC workflow:"
              echo "$NON_IGNORED_FILES" | xargs -n1 echo
            fi
          fi

          {
            echo "should_deploy=$SHOULD_DEPLOY"
            echo "base_sha=$BASE_SHA"
            echo "deploy_sha=$DEPLOY_SHA"
          } >> "$GITHUB_OUTPUT"

  deploy-blocked:
    name: 'deploy blocked'
    if: |
      github.event_name == 'workflow_run' &&
      (
        github.event.workflow_run.event != 'push' ||
        github.event.workflow_run.head_branch != 'main' ||
        github.event.workflow_run.actor.login == 'github-actions[bot]' ||
        github.event.workflow_run.conclusion != 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - name: explain skipped deploy
        run: |
          echo "Deploy skipped."
          echo "workflow_run event: ${{ github.event.workflow_run.event }}"
          echo "workflow_run branch: ${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run actor: ${{ github.event.workflow_run.actor.login }}"
          echo "workflow_run conclusion: ${{ github.event.workflow_run.conclusion }}"

  deploy:
    name: 'deploy to production'
    needs: prepare-deploy
    if: needs.prepare-deploy.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-deploy.outputs.deploy_sha }}

      - name: verify deploy sha belongs to main
        run: |
          git fetch origin refs/heads/main:refs/remotes/origin/main --force

          if ! git merge-base --is-ancestor "${{ needs.prepare-deploy.outputs.deploy_sha }}" origin/main; then
            echo "Refusing deploy: ${{ needs.prepare-deploy.outputs.deploy_sha }} is not contained in origin/main."
            exit 1
          fi
      
      - uses: dorny/paths-filter@master
        id: changes
        with:
          base: ${{ needs.prepare-deploy.outputs.base_sha }}
          ref: ${{ needs.prepare-deploy.outputs.deploy_sha }}
          filters: |
            sabine:
              - 'apps/sabine/**'
            helper:
              - 'apps/helper/**'
            web:
              - 'apps/web/**'
            api:
              - 'apps/api/**'
            global:
              - 'package.json'
              - 'turbo.json'
              - '.oxfmtrc.json'
              - '.oxlintrc.json'
              - 'docker-compose.yml'
              - 'prisma.config.js'
              - 'packages/**'
              - '.github/workflows/deploy.yml'

      - name: setup ssh
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          cat >>~/.ssh/config << END
          Host prod
            HostName $SSH_HOST
            User $SSH_USERNAME
            Port $SSH_PORT
            IdentityFile ~/.ssh/key
            StrictHostKeyChecking no
          END
        env:
          SSH_USERNAME: ${{ secrets.USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.HOST }}
          SSH_PORT: 22

      - name: calculate changes and deploy
        env:
          CHANGED_SABINE: ${{ steps.changes.outputs.sabine }}
          CHANGED_HELPER: ${{ steps.changes.outputs.helper }}
          CHANGED_WEB: ${{ steps.changes.outputs.web }}
          CHANGED_API: ${{ steps.changes.outputs.api }}
          CHANGED_GLOBAL: ${{ steps.changes.outputs.global }}
          DEPLOY_SHA: ${{ needs.prepare-deploy.outputs.deploy_sha }}
          DEPLOY_DELAY_SECONDS: 5
        run: |
          # Construct list of services to deploy
          SERVICES_TO_DEPLOY=""
          SKIP_SABINE_DEPLOY="false"

          # Verify sabine i18n only when apps/sabine changed.
          # If verification fails, skip sabine deploy without failing the workflow.
          if [ "$CHANGED_SABINE" == "true" ]; then
            echo "apps/sabine changed. Running i18n verification..."
            if ! node scripts/verify-i18n.js; then
              echo "i18n verification failed. Skipping deploy for service: sabine"
              SKIP_SABINE_DEPLOY="true"
            fi
          fi
          
          if [ "$CHANGED_GLOBAL" == "true" ]; then
            SERVICES_TO_DEPLOY="sabine helper web api"
          else
            [ "$CHANGED_SABINE" == "true" ] && SERVICES_TO_DEPLOY="$SERVICES_TO_DEPLOY sabine"
            [ "$CHANGED_HELPER" == "true" ] && SERVICES_TO_DEPLOY="$SERVICES_TO_DEPLOY helper"
            [ "$CHANGED_WEB" == "true" ] && SERVICES_TO_DEPLOY="$SERVICES_TO_DEPLOY web"
            [ "$CHANGED_API" == "true" ] && SERVICES_TO_DEPLOY="$SERVICES_TO_DEPLOY api"
          fi

          # Trim leading space
          SERVICES_TO_DEPLOY=$(echo $SERVICES_TO_DEPLOY | xargs)

          if [ "$SKIP_SABINE_DEPLOY" == "true" ]; then
            SERVICES_TO_DEPLOY=$(echo "$SERVICES_TO_DEPLOY" | sed 's/\<sabine\>//g' | xargs)
          fi

          if [ -z "$SERVICES_TO_DEPLOY" ]; then
            echo "No deployable changes detected."
            exit 0
          fi

          echo "Deploying: $SERVICES_TO_DEPLOY"

          # Fetch and deploy the exact commit that passed the OXC workflow.
          ssh prod "cd sabine/sabine && git fetch origin main && git checkout --detach \"$DEPLOY_SHA\" && DEPLOY_SHA=\"$DEPLOY_SHA\" SERVICES=\"$SERVICES_TO_DEPLOY\" DEPLOY_DELAY=\"$DEPLOY_DELAY_SECONDS\" bash -c '
            set -euo pipefail

            git fetch origin main
            git switch -C main \"\$DEPLOY_SHA\"
            git branch --set-upstream-to=origin/main main || true

            services=(\$SERVICES)
            last_index=\$((\${#services[@]} - 1))

            for index in \"\${!services[@]}\"; do
              service=\${services[\$index]}
              echo \"Rebuilding \$service...\"
              docker compose up -d --build \$service

              if [ \"\$index\" -lt \"\$last_index\" ]; then
                echo \"Waiting \${DEPLOY_DELAY}s for VPS stability...\"
                sleep \$DEPLOY_DELAY
              fi
            done
          '"
